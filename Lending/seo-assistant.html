<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SEO-Помощник</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { inter: ['Inter', 'sans-serif'] }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    * { font-family: 'Inter', system-ui, sans-serif; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f8fafc; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ─── pseudo-random seeded by URL ─── */
    function mkRand(seed) {
      let s = seed;
      return () => { s = (s * 1664525 + 1013904223) & 0xffffffff; return (s >>> 0) / 0xffffffff; };
    }

    /* ─── data generation ─── */
    function buildData(url, niche, region, comps) {
      const seed = [...url].reduce((a, c) => a + c.charCodeAt(0), 42);
      const r = mkRand(seed);

      const score   = Math.floor(32 + r() * 58);
      const loadRaw = (0.7 + r() * 4.3).toFixed(1);
      const mobile  = r() > 0.3;
      const ssl     = url.startsWith('https') || r() > 0.25;
      const sitemap = r() > 0.4;
      const robots  = r() > 0.35;

      const statusOf = s => s >= 80 ? 'Отлично' : s >= 60 ? 'Хорошо' : s >= 40 ? 'Нужны улучшения' : 'Критично';

      const competitors = comps.filter(c => c.trim()).map(c => ({
        label: c.replace(/^https?:\/\//, '').replace(/\/$/, '').slice(0, 20),
        score: Math.floor(28 + r() * 65),
      }));

      const keywords = [
        '', ` ${region}`, ` онлайн`, ' цена', ' стоимость',
        ` заказать`, ` купить`, ' недорого', ' отзывы', ' рейтинг',
        ` ${region} цена`, ' 2025', ' услуги', ' профессиональный',
        ` рядом`, ' лучший', ` топ`, ' как выбрать', ' сравнение', ' контакты',
      ].map((sfx, i) => ({
        kw   : `${niche.toLowerCase()}${sfx}`.trim(),
        freq : Math.floor(80 + r() * 12000),
        comp : Math.floor(8  + r() * 85),
        pos  : Math.floor(1  + r() * 99),
        topic: ['Коммерческие', 'Гео-запросы', 'Информационные', 'Брендовые'][i % 4],
      }));

      const plan = [];
      if (!ssl)                     plan.push({ p:1,  cat:'Технический',   action:'Установить SSL-сертификат (HTTPS)',                 d:'simple', e:'high' });
      if (parseFloat(loadRaw) > 3)  plan.push({ p:2,  cat:'Технический',   action:'Ускорить загрузку (изображения, кэш, CDN)',         d:'medium', e:'high' });
      if (!mobile)                  plan.push({ p:3,  cat:'Технический',   action:'Адаптировать сайт под мобильные устройства',       d:'hard',   e:'high' });
      if (!sitemap)                 plan.push({ p:4,  cat:'Технический',   action:'Создать и отправить sitemap.xml в GSC',            d:'simple', e:'medium' });
      if (!robots)                  plan.push({ p:5,  cat:'Технический',   action:'Настроить robots.txt',                             d:'simple', e:'medium' });
      plan.push({ p:6,  cat:'Контент',        action:`Добавить "${niche} ${region}" в Title и H1`,           d:'simple', e:'high' });
      plan.push({ p:7,  cat:'Контент',        action:'Написать уникальные Description для всех страниц',     d:'simple', e:'medium' });
      plan.push({ p:8,  cat:'Контент',        action:'Создать блог с информационными статьями по нише',      d:'hard',   e:'high' });
      plan.push({ p:9,  cat:'Ссылки',         action:'Нарастить ссылочную массу (каталоги, гостевые посты)', d:'medium', e:'medium' });
      plan.push({ p:10, cat:'Локальное SEO',  action:'Зарегистрировать в Google My Business и Я.Бизнес',    d:'simple', e:'high' });

      return {
        score, status: statusOf(score), competitors,
        tech: {
          speed  : { ok: parseFloat(loadRaw) < 2.5, val: `${loadRaw}s`,  fix: 'Сожмите изображения (WebP), включите Gzip и CDN' },
          mobile : { ok: mobile,                     fix: 'Внедрите адаптивную вёрстку (CSS-media или Bootstrap/Tailwind)' },
          ssl    : { ok: ssl,                         fix: "Установите Let's Encrypt — бесплатный SSL от Certbot" },
          sitemap: { ok: sitemap,                     fix: 'Создайте sitemap.xml и добавьте в Google Search Console' },
          robots : { ok: robots,                      fix: 'Создайте robots.txt: Allow — публичные страницы, Disallow — /admin' },
        },
        content: {
          title : { val: `${niche} в ${region} — профессиональные услуги`, len: Math.floor(28 + r()*32), ok: r()>.4 },
          desc  : { val: `Профессиональные услуги ${niche.toLowerCase()} в ${region}. Опыт 10+ лет. Гарантия качества. Звоните!`, len: Math.floor(95+r()*70), ok: r()>.35 },
          h1: [`${niche}: ваш надёжный партнёр в ${region}`],
          h2: ['О нас', 'Наши услуги', 'Преимущества', 'Цены', 'Контакты'],
          h3: ['Быстро', 'Качественно', 'Гарантия', 'FAQ', 'Отзывы'],
          recs: [
            `Включите "${niche} ${region}" в начало тега <title>`,
            'Расширьте Description до 150–160 симв. с призывом к действию',
            'Добавьте alt-атрибуты ко всем изображениям на странице',
            'Убедитесь, что на странице только один тег H1',
            'Добавьте ключевые слова в первый абзац основного текста',
            'Используйте LSI-слова для расширения семантики',
          ],
        },
        keywords,
        plan: plan.sort((a, b) => a.p - b.p),
      };
    }

    /* ─── helpers ─── */
    const diffMap = { simple: ['Простое','green'], medium: ['Среднее','amber'], hard: ['Сложное','red'] };
    const effMap  = { high:   ['Высокий','green'], medium: ['Средний','blue'], low: ['Низкий','gray'] };

    const topicColor = t =>
      t === 'Коммерческие'  ? 'bg-green-100 text-green-700' :
      t === 'Гео-запросы'   ? 'bg-blue-100 text-blue-700'   :
      t === 'Информационные'? 'bg-amber-100 text-amber-700'  : 'bg-gray-100 text-gray-600';

    const badgeClass = c =>
      c === 'green' ? 'bg-green-100 text-green-700' :
      c === 'amber' ? 'bg-amber-100 text-amber-700' :
      c === 'red'   ? 'bg-red-100 text-red-600'     :
      c === 'blue'  ? 'bg-blue-100 text-blue-700'   : 'bg-gray-100 text-gray-600';

    /* ─── CircularScore ─── */
    function CircularScore({ score, status }) {
      const R = 78, C = 2 * Math.PI * R;
      const offset = C - (score / 100) * C;
      const color  = score >= 80 ? '#22c55e' : score >= 60 ? '#3b82f6' : score >= 40 ? '#f59e0b' : '#ef4444';
      const tc     = score >= 80 ? 'text-green-600' : score >= 60 ? 'text-blue-600' : score >= 40 ? 'text-amber-600' : 'text-red-500';
      const bg     = score >= 80 ? 'bg-green-100 text-green-700' : score >= 60 ? 'bg-blue-100 text-blue-700' : score >= 40 ? 'bg-amber-100 text-amber-700' : 'bg-red-100 text-red-600';
      return (
        <div className="flex flex-col items-center">
          <div className="relative" style={{width:196,height:196}}>
            <svg width="196" height="196" style={{transform:'rotate(-90deg)'}}>
              <circle cx="98" cy="98" r={R} fill="none" stroke="#f1f5f9" strokeWidth="15"/>
              <circle cx="98" cy="98" r={R} fill="none" stroke={color} strokeWidth="15"
                strokeDasharray={C} strokeDashoffset={offset} strokeLinecap="round"
                style={{transition:'stroke-dashoffset 1.1s cubic-bezier(.4,0,.2,1)'}}/>
            </svg>
            <div className="absolute inset-0 flex flex-col items-center justify-center">
              <span className={`text-5xl font-extrabold ${tc}`}>{score}</span>
              <span className="text-xs text-gray-400 mt-0.5">из 100</span>
            </div>
          </div>
          <span className={`mt-4 px-4 py-1.5 rounded-full text-sm font-semibold ${bg}`}>{status}</span>
        </div>
      );
    }

    /* ─── BarChart (Chart.js) ─── */
    function BarChart({ score, comps }) {
      const ref = useRef(null);
      const ch  = useRef(null);
      useEffect(() => {
        if (!ref.current) return;
        if (ch.current) ch.current.destroy();
        const labels = ['Ваш сайт', ...comps.map(c => c.label)];
        const data   = [score, ...comps.map(c => c.score)];
        const colors = data.map((_, i) => i === 0 ? '#22c55e' : '#94a3b8');
        ch.current = new Chart(ref.current, {
          type: 'bar',
          data: { labels, datasets: [{ data, backgroundColor: colors, borderRadius: 8, borderSkipped: false }] },
          options: {
            responsive: true,
            plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ` SEO-скор: ${ctx.parsed.y}` } } },
            scales: {
              y: { min: 0, max: 100, grid: { color: '#f1f5f9' }, ticks: { font: { size: 11 } } },
              x: { grid: { display: false },  ticks: { font: { size: 11 } } },
            },
          },
        });
        return () => ch.current?.destroy();
      }, [score, comps]);
      return <canvas ref={ref} />;
    }

    /* ─── AuditRow ─── */
    function AuditRow({ label, ok, val, fix }) {
      return (
        <div className={`flex items-start gap-4 p-4 rounded-xl border ${ok ? 'border-green-200 bg-green-50' : 'border-red-100 bg-red-50'}`}>
          <div className={`flex-shrink-0 w-8 h-8 rounded-full flex items-center justify-center ${ok ? 'bg-green-500' : 'bg-red-500'}`}>
            {ok
              ? <svg className="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2.5}><path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7"/></svg>
              : <svg className="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2.5}><path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
            }
          </div>
          <div className="flex-1 min-w-0">
            <div className="flex items-center justify-between gap-2">
              <span className="font-medium text-gray-800 text-sm">{label}</span>
              {val && <span className={`text-sm font-semibold ${ok ? 'text-green-600' : 'text-red-500'}`}>{val}</span>}
            </div>
            {!ok && <p className="mt-1 text-xs text-gray-500 leading-relaxed">{fix}</p>}
          </div>
        </div>
      );
    }

    /* ─── App ─── */
    function App() {
      const [form, setForm]       = useState({ url: '', niche: '', region: '', comps: ['', '', '', '', ''] });
      const [data, setData]       = useState(null);
      const [loading, setLoading] = useState(false);
      const [tab, setTab]         = useState(0);
      const [err, setErr]         = useState({});

      const validate = () => {
        const e = {};
        if (!form.url.trim())    e.url    = 'Введите URL сайта';
        if (!form.niche.trim())  e.niche  = 'Введите нишу / тематику';
        if (!form.region.trim()) e.region = 'Введите регион';
        return e;
      };

      const analyze = () => {
        const e = validate();
        if (Object.keys(e).length) { setErr(e); return; }
        setErr({});
        setLoading(true);
        setData(null);
        setTimeout(() => {
          setData(buildData(form.url, form.niche, form.region, form.comps));
          setLoading(false);
          setTab(0);
        }, 1800);
      };

      const TABS = ['Обзор', 'Технический аудит', 'Контент', 'Ключевые слова', 'План действий'];

      return (
        <div className="min-h-screen bg-gray-50">

          {/* ── Header ── */}
          <header className="bg-white border-b border-gray-200 sticky top-0 z-20">
            <div className="max-w-6xl mx-auto px-6 h-16 flex items-center gap-3">
              <div className="w-9 h-9 rounded-xl bg-green-500 flex items-center justify-center flex-shrink-0">
                <svg className="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                  <path strokeLinecap="round" strokeLinejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                </svg>
              </div>
              <div>
                <h1 className="text-base font-bold text-gray-900 leading-none">SEO-Помощник</h1>
                <p className="text-xs text-gray-400 mt-0.5">Профессиональный анализ сайта</p>
              </div>
              <a href="landing.html" className="ml-auto flex items-center gap-1.5 text-sm font-medium text-green-600 hover:text-green-700 transition-colors">
                <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                  <path strokeLinecap="round" strokeLinejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
                На главную
              </a>
            </div>
          </header>

          <main className="max-w-6xl mx-auto px-6 py-10">

            {/* ── Form ── */}
            <div className="bg-white rounded-2xl border border-gray-200 shadow-sm p-8 mb-8">
              <h2 className="text-xl font-bold text-gray-900 mb-1">Анализ сайта</h2>
              <p className="text-sm text-gray-500 mb-7">Введите данные о сайте — получите подробный SEO-отчёт</p>

              <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                {/* URL */}
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1.5">URL сайта <span className="text-red-400">*</span></label>
                  <input type="url" placeholder="https://example.com" value={form.url}
                    onChange={e => setForm(f => ({...f, url: e.target.value}))}
                    className={`w-full px-4 py-3 rounded-xl border text-sm transition-colors focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-transparent ${err.url ? 'border-red-400 bg-red-50' : 'border-gray-200 bg-white hover:border-gray-300'}`}/>
                  {err.url && <p className="mt-1 text-xs text-red-500">{err.url}</p>}
                </div>

                {/* Niche */}
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1.5">Ниша / Тематика <span className="text-red-400">*</span></label>
                  <input type="text" placeholder="Юридические услуги" value={form.niche}
                    onChange={e => setForm(f => ({...f, niche: e.target.value}))}
                    className={`w-full px-4 py-3 rounded-xl border text-sm transition-colors focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-transparent ${err.niche ? 'border-red-400 bg-red-50' : 'border-gray-200 bg-white hover:border-gray-300'}`}/>
                  {err.niche && <p className="mt-1 text-xs text-red-500">{err.niche}</p>}
                </div>

                {/* Region */}
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1.5">Регион <span className="text-red-400">*</span></label>
                  <input type="text" placeholder="Москва" value={form.region}
                    onChange={e => setForm(f => ({...f, region: e.target.value}))}
                    className={`w-full px-4 py-3 rounded-xl border text-sm transition-colors focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-transparent ${err.region ? 'border-red-400 bg-red-50' : 'border-gray-200 bg-white hover:border-gray-300'}`}/>
                  {err.region && <p className="mt-1 text-xs text-red-500">{err.region}</p>}
                </div>

                {/* Competitors */}
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1.5">Конкуренты <span className="text-gray-400 font-normal">(до 5 URL)</span></label>
                  <div className="flex flex-col gap-2">
                    {form.comps.map((c, i) => (
                      <input key={i} type="url" placeholder={`Конкурент ${i+1}`} value={c}
                        onChange={e => { const next=[...form.comps]; next[i]=e.target.value; setForm(f=>({...f,comps:next})); }}
                        className="w-full px-4 py-2.5 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-transparent hover:border-gray-300 transition-colors"/>
                    ))}
                  </div>
                </div>
              </div>

              <button onClick={analyze} disabled={loading}
                className="mt-7 inline-flex items-center gap-2 px-8 py-3.5 rounded-xl bg-green-500 hover:bg-green-600 active:bg-green-700 disabled:bg-gray-300 text-white font-semibold text-sm transition-colors">
                {loading
                  ? <><svg className="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>Анализирую…</>
                  : <><svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>Анализировать</>
                }
              </button>
            </div>

            {/* ── Loading ── */}
            {loading && (
              <div className="bg-white rounded-2xl border border-gray-200 shadow-sm p-16 text-center">
                <div className="w-16 h-16 mx-auto mb-5 rounded-full bg-green-50 flex items-center justify-center">
                  <svg className="animate-spin w-8 h-8 text-green-500" fill="none" viewBox="0 0 24 24">
                    <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/>
                    <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
                  </svg>
                </div>
                <p className="font-semibold text-gray-800">Анализируем сайт…</p>
                <p className="text-sm text-gray-400 mt-1">Проверяем технические параметры, собираем ключевые слова</p>
              </div>
            )}

            {/* ── Dashboard ── */}
            {data && (
              <div>
                {/* tabs */}
                <div className="flex gap-1 bg-white border border-gray-200 rounded-xl p-1 mb-6 overflow-x-auto">
                  {TABS.map((t, i) => (
                    <button key={i} onClick={() => setTab(i)}
                      className={`flex-shrink-0 px-4 py-2 rounded-lg text-sm font-medium transition-colors ${tab===i ? 'bg-green-500 text-white shadow-sm' : 'text-gray-500 hover:bg-gray-100'}`}>
                      {t}
                    </button>
                  ))}
                </div>

                {/* ── Tab 0: Overview ── */}
                {tab === 0 && (
                  <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    {/* Score card */}
                    <div className="bg-white rounded-2xl border border-gray-200 shadow-sm p-8">
                      <h3 className="font-bold text-gray-900 text-lg mb-6">SEO-скор</h3>
                      <div className="flex flex-col items-center">
                        <CircularScore score={data.score} status={data.status}/>
                      </div>
                      <div className="mt-6 grid grid-cols-3 gap-3 text-center">
                        <div className="bg-gray-50 rounded-xl p-3">
                          <div className={`text-xl font-bold ${parseFloat(data.tech.speed.val) < 2.5 ? 'text-green-600' : 'text-red-500'}`}>{data.tech.speed.val}</div>
                          <div className="text-xs text-gray-400 mt-0.5">Скорость</div>
                        </div>
                        <div className="bg-gray-50 rounded-xl p-3">
                          <div className="text-xl font-bold text-gray-800">{Object.values(data.tech).filter(v=>v.ok).length}/5</div>
                          <div className="text-xs text-gray-400 mt-0.5">Тех. факторы</div>
                        </div>
                        <div className="bg-gray-50 rounded-xl p-3">
                          <div className="text-xl font-bold text-gray-800">{data.keywords.filter(k=>k.pos<=10).length}</div>
                          <div className="text-xs text-gray-400 mt-0.5">Топ-10</div>
                        </div>
                      </div>
                    </div>

                    {/* Competitor chart */}
                    {data.competitors.length > 0
                      ? <div className="bg-white rounded-2xl border border-gray-200 shadow-sm p-8">
                          <h3 className="font-bold text-gray-900 text-lg mb-6">Сравнение с конкурентами</h3>
                          <BarChart score={data.score} comps={data.competitors}/>
                        </div>
                      : <div className="bg-white rounded-2xl border border-gray-200 shadow-sm p-8 flex flex-col items-center justify-center text-center">
                          <svg className="w-14 h-14 text-gray-200 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
                          <p className="text-sm text-gray-400">Добавьте конкурентов<br/>для сравнения</p>
                        </div>
                    }
                  </div>
                )}

                {/* ── Tab 1: Technical ── */}
                {tab === 1 && (
                  <div className="bg-white rounded-2xl border border-gray-200 shadow-sm p-8">
                    <h3 className="font-bold text-gray-900 text-lg mb-6">Технический аудит</h3>
                    <div className="flex flex-col gap-3">
                      <AuditRow label="Скорость загрузки"         ok={data.tech.speed.ok}   val={data.tech.speed.val} fix={data.tech.speed.fix}/>
                      <AuditRow label="Мобильная версия"          ok={data.tech.mobile.ok}                            fix={data.tech.mobile.fix}/>
                      <AuditRow label="SSL-сертификат (HTTPS)"    ok={data.tech.ssl.ok}                               fix={data.tech.ssl.fix}/>
                      <AuditRow label="Карта сайта (sitemap.xml)" ok={data.tech.sitemap.ok}                           fix={data.tech.sitemap.fix}/>
                      <AuditRow label="Файл robots.txt"           ok={data.tech.robots.ok}                            fix={data.tech.robots.fix}/>
                    </div>
                  </div>
                )}

                {/* ── Tab 2: Content ── */}
                {tab === 2 && (
                  <div className="flex flex-col gap-6">
                    {/* Meta */}
                    <div className="bg-white rounded-2xl border border-gray-200 shadow-sm p-8">
                      <h3 className="font-bold text-gray-900 text-lg mb-5">Мета-теги</h3>
                      <div className="flex flex-col gap-4">
                        {[
                          { tag:'Title',       d:data.content.title, maxLen:60,  hint:'60' },
                          { tag:'Description', d:data.content.desc,  maxLen:160, hint:'120–160' },
                        ].map(({tag, d, maxLen, hint}) => (
                          <div key={tag} className={`p-4 rounded-xl border ${d.ok ? 'border-green-200 bg-green-50' : 'border-amber-200 bg-amber-50'}`}>
                            <div className="flex items-center justify-between mb-2">
                              <span className="text-sm font-semibold text-gray-800">{tag}</span>
                              <div className="flex items-center gap-2">
                                <span className={`text-xs font-medium ${d.len <= maxLen ? 'text-green-600' : 'text-amber-600'}`}>{d.len} симв.</span>
                                <span className={`px-2.5 py-0.5 rounded-full text-xs font-semibold ${badgeClass(d.ok ? 'green' : 'amber')}`}>{d.ok ? 'OK' : `Рекомендуется ${hint} симв.`}</span>
                              </div>
                            </div>
                            <p className="text-sm text-gray-700">{d.val}</p>
                          </div>
                        ))}
                      </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                      {/* Headings */}
                      <div className="bg-white rounded-2xl border border-gray-200 shadow-sm p-8">
                        <h3 className="font-bold text-gray-900 text-lg mb-5">Структура заголовков</h3>
                        {['h1','h2','h3'].map(h => (
                          <div key={h} className="mb-5 last:mb-0">
                            <div className="flex items-center gap-2 mb-2">
                              <span className="px-2 py-0.5 bg-green-100 text-green-700 text-xs font-mono font-bold rounded">{`<${h.toUpperCase()}>`}</span>
                              <span className="text-xs text-gray-400">{data.content[h].length} шт.</span>
                            </div>
                            {data.content[h].map((t,i) => (
                              <div key={i} className="text-sm text-gray-700 py-1 border-b border-gray-100 last:border-0">{t}</div>
                            ))}
                          </div>
                        ))}
                      </div>

                      {/* Recs */}
                      <div className="bg-white rounded-2xl border border-gray-200 shadow-sm p-8">
                        <h3 className="font-bold text-gray-900 text-lg mb-5">Рекомендации</h3>
                        <ul className="flex flex-col gap-3.5">
                          {data.content.recs.map((r,i) => (
                            <li key={i} className="flex items-start gap-3">
                              <span className="flex-shrink-0 w-5 h-5 rounded-full bg-amber-100 text-amber-700 text-xs font-bold flex items-center justify-center mt-0.5">{i+1}</span>
                              <span className="text-sm text-gray-700 leading-relaxed">{r}</span>
                            </li>
                          ))}
                        </ul>
                      </div>
                    </div>
                  </div>
                )}

                {/* ── Tab 3: Keywords ── */}
                {tab === 3 && (
                  <div className="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
                    <div className="px-6 py-5 border-b border-gray-100 flex items-center justify-between">
                      <div>
                        <h3 className="font-bold text-gray-900 text-lg">Ключевые слова</h3>
                        <p className="text-sm text-gray-400 mt-0.5">{data.keywords.length} рекомендованных запросов</p>
                      </div>
                    </div>
                    <div className="overflow-x-auto">
                      <table className="w-full text-sm">
                        <thead>
                          <tr className="bg-gray-50">
                            <th className="text-left px-6 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide">Ключевое слово</th>
                            <th className="text-right px-6 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide">Частотность</th>
                            <th className="text-center px-6 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide">Конкуренция</th>
                            <th className="text-center px-6 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide">Позиция</th>
                            <th className="text-center px-6 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide">Тема</th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-gray-100">
                          {data.keywords.map((kw,i) => (
                            <tr key={i} className="hover:bg-gray-50 transition-colors">
                              <td className="px-6 py-3.5 font-medium text-gray-900">{kw.kw}</td>
                              <td className="px-6 py-3.5 text-right text-gray-700">{kw.freq.toLocaleString('ru-RU')}</td>
                              <td className="px-6 py-3.5">
                                <div className="flex items-center justify-center gap-2">
                                  <div className="w-20 h-1.5 rounded-full bg-gray-200">
                                    <div className="h-full rounded-full transition-all" style={{width:`${kw.comp}%`, background: kw.comp>70?'#ef4444':kw.comp>40?'#f59e0b':'#22c55e'}}/>
                                  </div>
                                  <span className="text-xs text-gray-500 w-8">{kw.comp}%</span>
                                </div>
                              </td>
                              <td className="px-6 py-3.5 text-center">
                                <span className={`font-semibold ${kw.pos<=10?'text-green-600':kw.pos<=30?'text-amber-600':'text-gray-400'}`}>
                                  #{kw.pos}
                                </span>
                              </td>
                              <td className="px-6 py-3.5 text-center">
                                <span className={`px-2.5 py-0.5 rounded-full text-xs font-semibold ${topicColor(kw.topic)}`}>{kw.topic}</span>
                              </td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
                )}

                {/* ── Tab 4: Action Plan ── */}
                {tab === 4 && (
                  <div className="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
                    <div className="px-6 py-5 border-b border-gray-100">
                      <h3 className="font-bold text-gray-900 text-lg">План действий</h3>
                      <p className="text-sm text-gray-400 mt-0.5">Приоритизированный список — начните сверху</p>
                    </div>
                    <div className="divide-y divide-gray-100">
                      {data.plan.map((item,i) => {
                        const [dLabel, dColor] = diffMap[item.d];
                        const [eLabel, eColor] = effMap[item.e];
                        return (
                          <div key={i} className="flex items-center gap-4 px-6 py-4 hover:bg-gray-50 transition-colors">
                            <div className="flex-shrink-0 w-8 h-8 rounded-full bg-green-50 text-green-700 font-bold text-sm flex items-center justify-center">{item.p}</div>
                            <div className="flex-1 min-w-0">
                              <p className="font-medium text-gray-900 text-sm">{item.action}</p>
                              <p className="text-xs text-gray-400 mt-0.5">{item.cat}</p>
                            </div>
                            <div className="flex items-center gap-2 flex-shrink-0">
                              <span className={`px-2.5 py-0.5 rounded-full text-xs font-semibold ${badgeClass(dColor)}`}>{dLabel}</span>
                              <span className={`px-2.5 py-0.5 rounded-full text-xs font-semibold ${badgeClass(eColor)}`}>{eLabel}</span>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}

              </div>
            )}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
