services:
  - type: web
    name: beauty-catalog-api
    runtime: python
    rootDir: tg-beauty-catalog/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: 3.11.0
