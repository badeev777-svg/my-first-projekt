<!DOCTYPE html>
<!--
  index.html — точка входа Telegram Mini App
  Автор: Анна Петрова — Nail-мастер (tg-beauty-catalog)
  Стек: HTML + CSS + Vanilla JS, Telegram Web App SDK
-->
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <!--
    viewport: maximum-scale=1.0, user-scalable=no — блокируем масштабирование (нативный feel)
  -->
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#FAF7F4">
  <title>Анна Петрова — Nail-мастер</title>

  <!-- Telegram Web App SDK — ОБЯЗАТЕЛЬНО первым -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <!-- Ранний сигнал готовности: Telegram перестаёт показывать свой загрузчик
       как только SDK загрузился, не ожидая шрифтов и стилей -->
  <script>window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.ready();</script>

  <!-- Шрифт Inter — загружаем асинхронно, чтобы не блокировать скрипты -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style"
    onload="this.onload=null;this.rel='stylesheet'"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  <noscript>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  </noscript>

  <!-- Стили приложения -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!--
    #app — главная оболочка.
    Максимальная ширина 430px, центрирована на десктопе (для разработки).
  -->
  <div id="app">

    <!--
      #screens — контейнер, в который JS рендерит текущий экран.
      Каждый экран — это .screen-div, который заменяется при навигации.
    -->
    <div id="screens">
      <!-- Первый экран рендерится через Router.tab('home') в app.js -->
      <div class="screen">
        <!-- Спиннер загрузки (виден ~150ms пока JS инициализируется) -->
        <div style="display:flex;align-items:center;justify-content:center;height:100%;">
          <div class="spinner"></div>
        </div>
      </div>
    </div>

    <!--
      #tab-bar — нижняя навигация.
      Иконки: SVG inline (не зависим от CDN иконок).
      Управляется через Router._updateTabBarVisibility().
    -->
    <nav id="tab-bar" class="tab-bar">

      <!-- Таб: Каталог -->
      <button class="tab-item active" data-tab="catalog" aria-label="Каталог">
        <span class="tab-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7" rx="1"/>
            <rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/>
            <rect x="14" y="14" width="7" height="7" rx="1"/>
          </svg>
        </span>
        <span class="tab-label">Каталог</span>
      </button>

      <!-- Таб: О мастере -->
      <button class="tab-item" data-tab="about" aria-label="О мастере">
        <span class="tab-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </span>
        <span class="tab-label">О мастере</span>
      </button>

      <!-- Таб: Портфолио -->
      <button class="tab-item" data-tab="portfolio" aria-label="Портфолио">
        <span class="tab-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
        </span>
        <span class="tab-label">Портфолио</span>
      </button>

      <!-- Таб: Мои записи -->
      <button class="tab-item" data-tab="bookings" aria-label="Мои записи">
        <span class="tab-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8"  y1="2" x2="8"  y2="6"/>
            <line x1="3"  y1="10" x2="21" y2="10"/>
            <line x1="8"  y1="15" x2="8"  y2="15" stroke-width="2.5"/>
            <line x1="12" y1="15" x2="16" y2="15"/>
            <line x1="8"  y1="19" x2="8"  y2="19" stroke-width="2.5"/>
            <line x1="12" y1="19" x2="16" y2="19"/>
          </svg>
        </span>
        <span class="tab-label">Мои записи</span>
      </button>

    </nav>
  </div>

  <!--
    #photo-viewer — полноэкранный просмотр фото (поверх всего).
    Управляется через Events.openPhotoViewer() / closePhotoViewer().
  -->
  <div id="photo-viewer" class="photo-viewer hidden" role="dialog" aria-label="Просмотр фото">
    <!-- Контент рендерится динамически -->
  </div>

  <!--
    #browser-main-btn — кнопка-заглушка для тестирования MainButton в браузере.
    В Telegram не отображается — там используется нативная MainButton.
  -->
  <button id="browser-main-btn"
    style="
      display:none;
      position:fixed;
      bottom:0;left:0;right:0;
      height:56px;
      background:#C9967A;
      color:#fff;
      font-size:16px;
      font-weight:600;
      font-family:inherit;
      border:none;
      cursor:pointer;
      z-index:200;
      align-items:center;
      justify-content:center;
      letter-spacing:0.2px;
    ">
    Записаться
  </button>

  <!--
    #browser-back-btn — кнопка назад для тестирования BackButton в браузере.
  -->
  <button id="browser-back-btn"
    style="
      display:none;
      position:fixed;
      top:10px;left:10px;
      width:36px;height:36px;
      background:rgba(0,0,0,0.5);
      color:#fff;
      border:none;
      border-radius:50%;
      cursor:pointer;
      z-index:200;
      font-size:18px;
      align-items:center;
      justify-content:center;
    "
    onclick="if(window.tg && tg.BackButton && tg.BackButton._cb) tg.BackButton._cb();">
    ‹
  </button>

  <!-- Данные приложения (услуги, отзывы и т.д.) -->
  <script src="js/data.js"></script>

  <!-- Логика приложения (навигация, экраны, события) -->
  <script src="js/app.js"></script>

</body>
</html>
